<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocChat - Local AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-main:    #0f0f10;
      --bg-sidebar: #161618;
      --bg-card:    #1e1e21;
      --bg-input:   #27272b;
      --accent:     #7c6af7;
      --accent-h:   #6558e0;
      --success:    #22c55e;
      --danger:     #ef4444;
      --text-1:     #f4f4f5;
      --text-2:     #a1a1aa;
      --border:     #2e2e33;
      --radius:     12px;
      --font:       "Segoe UI", system-ui, sans-serif;
    }
    body { font-family: var(--font); background: var(--bg-main); color: var(--text-1); display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 280px; min-width: 280px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 16px; gap: 20px; overflow-y: auto; }
    .sidebar-header { display: flex; align-items: center; gap: 10px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), #a78bfa); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #fff; letter-spacing: -1px; }
    .sidebar-header h1 { font-size: 1.1rem; font-weight: 700; }
    .sidebar-header .sub { font-size: 0.7rem; color: var(--text-2); }
    .section-label { font-size: 0.7rem; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
    .model-select-wrapper { position: relative; }
    .model-select-wrapper select { width: 100%; padding: 10px 36px 10px 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-1); font-size: 0.9rem; font-family: var(--font); appearance: none; cursor: pointer; transition: border-color 0.2s; }
    .model-select-wrapper select:focus { outline: none; border-color: var(--accent); }
    .model-select-wrapper::after { content: "v"; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-2); pointer-events: none; font-size: 0.7rem; }
    .upload-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; display: flex; flex-direction: column; gap: 10px; }
    .file-drop { border: 2px dashed var(--border); border-radius: 8px; padding: 14px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; position: relative; }
    .file-drop:hover, .file-drop.dragover { border-color: var(--accent); background: rgba(124,106,247,0.06); }
    .file-drop input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .file-drop .drop-icon { font-size: 22px; margin-bottom: 4px; }
    .file-drop p { font-size: 0.8rem; color: var(--text-2); }
    .file-drop .file-name { font-size: 0.82rem; color: var(--accent); font-weight: 500; margin-top: 4px; word-break: break-all; }
    .btn-upload { padding: 10px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-upload:hover { background: var(--accent-h); }
    .btn-upload:disabled { opacity: 0.5; cursor: not-allowed; }
    .upload-status { font-size: 0.8rem; padding: 8px 10px; border-radius: 6px; display: none; }
    .upload-status.success { background: rgba(34,197,94,.12); color: var(--success); display: block; }
    .upload-status.error   { background: rgba(239,68,68,.12);  color: var(--danger);  display: block; }
    .upload-status.loading { background: rgba(124,106,247,.1); color: var(--accent);  display: block; }
    .progress-wrap { display: none; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-wrap.show { display: block; }
    .progress-bar { height: 100%; width: 0; background: var(--accent); border-radius: 2px; transition: width 0.2s; }
    .doc-badge { display: none; align-items: center; gap: 8px; background: rgba(124,106,247,.1); border: 1px solid rgba(124,106,247,.25); border-radius: 8px; padding: 8px 10px; font-size: 0.8rem; color: var(--accent); }
    .doc-badge.show { display: flex; }
    .doc-badge span { flex: 1; word-break: break-all; }
    .btn-clear { margin-top: auto; padding: 9px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text-2); font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
    .btn-clear:hover { border-color: var(--danger); color: var(--danger); }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; background: var(--bg-sidebar); }
    .chat-header h2 { font-size: 0.95rem; font-weight: 600; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); box-shadow: 0 0 6px var(--success); }
    .model-badge { margin-left: auto; padding: 4px 10px; background: rgba(124,106,247,.15); border: 1px solid rgba(124,106,247,.3); border-radius: 20px; font-size: 0.75rem; color: var(--accent); }
    .chat-box { flex: 1; overflow-y: auto; padding: 28px 24px; display: flex; flex-direction: column; gap: 4px; scroll-behavior: smooth; }
    .chat-box::-webkit-scrollbar { width: 6px; }
    .chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .empty-state { margin: auto; text-align: center; color: var(--text-2); max-width: 380px; }
    .empty-state .big-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 1.1rem; color: var(--text-1); margin-bottom: 6px; }
    .empty-state p { font-size: 0.85rem; line-height: 1.6; }
    .msg-row { display: flex; gap: 12px; padding: 6px 0; max-width: 820px; width: 100%; margin: 0 auto; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .msg-row.user { flex-direction: row-reverse; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; margin-top: 2px; letter-spacing: -0.5px; }
    .avatar.user-av { background: linear-gradient(135deg, #f59e0b, #ef4444); color: #fff; }
    .avatar.bot-av  { background: linear-gradient(135deg, var(--accent), #a78bfa); color: #fff; }
    .bubble { padding: 12px 16px; border-radius: 16px; line-height: 1.7; font-size: 0.9rem; max-width: calc(100% - 50px); word-break: break-word; }
    .msg-row.user .bubble { background: rgba(124,106,247,.18); border: 1px solid rgba(124,106,247,.25); border-top-right-radius: 4px; }
    .msg-row.bot  .bubble { background: var(--bg-card); border: 1px solid var(--border); border-top-left-radius: 4px; }
    .msg-meta { font-size: 0.7rem; color: var(--text-2); margin-top: 3px; padding: 0 2px; }
    .msg-row.user .msg-meta { text-align: right; }
    .msg-group { display: flex; flex-direction: column; flex: 1; min-width: 0; }
    .msg-row.user .msg-group { align-items: flex-end; }
    .typing-dots { display: inline-flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing-dots span { width: 7px; height: 7px; background: var(--text-2); border-radius: 50%; animation: bounce 1.2s infinite ease-in-out; }
    .typing-dots span:nth-child(1) { animation-delay: 0s; }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-6px); opacity: 1; } }
    .cursor { display: inline-block; width: 2px; height: 1em; background: var(--text-2); border-radius: 1px; vertical-align: text-bottom; animation: blink 0.8s step-end infinite; margin-left: 2px; }
    @keyframes blink { 50% { opacity: 0; } }
    .input-area { padding: 16px 24px 20px; background: var(--bg-main); border-top: 1px solid var(--border); }
    .input-wrapper { max-width: 820px; margin: 0 auto; background: var(--bg-input); border: 1px solid var(--border); border-radius: 14px; display: flex; align-items: flex-end; padding: 6px 6px 6px 16px; transition: border-color 0.2s; }
    .input-wrapper:focus-within { border-color: var(--accent); }
    textarea { flex: 1; background: transparent; border: none; color: var(--text-1); font-size: 0.95rem; font-family: var(--font); resize: none; max-height: 160px; min-height: 40px; line-height: 1.5; padding: 8px 0; outline: none; }
    textarea::placeholder { color: var(--text-2); }
    .btn-send { width: 38px; height: 38px; background: var(--accent); border: none; border-radius: 10px; color: white; font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.1s; flex-shrink: 0; }
    .btn-send:hover { background: var(--accent-h); }
    .btn-send:active { transform: scale(0.93); }
    .btn-send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .input-hint { max-width: 820px; margin: 6px auto 0; font-size: 0.72rem; color: var(--text-2); text-align: center; }
    .bubble code { background: rgba(0,0,0,.3); padding: 2px 6px; border-radius: 4px; font-size: 0.85em; font-family: Consolas, monospace; }
    .bubble pre { background: rgba(0,0,0,.35); border-radius: 8px; padding: 12px 14px; overflow-x: auto; margin: 8px 0; }
    .bubble pre code { background: none; padding: 0; }
    .bubble strong { color: #e4e4e7; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon">DC</div>
    <div>
      <h1>DocChat</h1>
      <div class="sub">Local AI &middot; Ollama</div>
    </div>
  </div>

  <div>
    <div class="section-label">Model</div>
    <div class="model-select-wrapper">
      <select id="model-select"><option value="llama3.2">llama3.2</option></select>
    </div>
  </div>

  <div>
    <div class="section-label">Document</div>
    <div class="upload-card">
      <div class="file-drop" id="drop-zone">
        <input type="file" id="file-input" accept=".pdf,.doc,.docx,.xls,.xlsx" />
        <div class="drop-icon">[doc]</div>
        <p>Click or drag &amp; drop</p>
        <p>PDF &middot; DOCX &middot; XLSX</p>
        <div class="file-name" id="file-name-display"></div>
      </div>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <button class="btn-upload" id="upload-btn" onclick="uploadFile()">Upload &amp; Process</button>
      <div class="upload-status" id="upload-status"></div>
    </div>
  </div>

  <div class="doc-badge" id="doc-badge">
    <span>[file]</span>
    <span id="doc-badge-name"></span>
  </div>

  <button class="btn-clear" onclick="clearChat()">[x] Clear Conversation</button>
</aside>

<div class="main">
  <div class="chat-header">
    <div class="status-dot"></div>
    <h2>Document Q&amp;A</h2>
    <div class="model-badge" id="model-badge">llama3.2</div>
  </div>

  <div class="chat-box" id="chat-box">
    <div class="empty-state" id="empty-state">
      <div class="big-icon">[chat]</div>
      <h3>Start a conversation</h3>
      <p>Upload a PDF, Word, or Excel file on the left, then ask anything about it.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea id="user-input" rows="1" placeholder="Ask a question about your document..."
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="send-btn" onclick="sendMessage()" title="Send">&gt;</button>
    </div>
    <div class="input-hint">Enter to send &middot; Shift+Enter for new line</div>
  </div>
</div>

<script>
  async function loadModels() {
    try {
      const r = await fetch("/models");
      const { models } = await r.json();
      const sel = document.getElementById("model-select");
      sel.innerHTML = "";
      models.forEach(function(m) {
        const opt = document.createElement("option");
        opt.value = m; opt.textContent = m;
        if (m.indexOf("llama3.2") !== -1) opt.selected = true;
        sel.appendChild(opt);
      });
      updateModelBadge();
    } catch(e) {}
  }
  loadModels();

  document.getElementById("model-select").addEventListener("change", updateModelBadge);
  function updateModelBadge() {
    document.getElementById("model-badge").textContent = document.getElementById("model-select").value;
  }

  var dropZone = document.getElementById("drop-zone");
  var fileInput = document.getElementById("file-input");
  fileInput.addEventListener("change", function() { showFileName(fileInput.files[0]); });
  dropZone.addEventListener("dragover", function(e) { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", function() { dropZone.classList.remove("dragover"); });
  dropZone.addEventListener("drop", function(e) {
    e.preventDefault(); dropZone.classList.remove("dragover");
    if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; showFileName(fileInput.files[0]); }
  });
  function showFileName(file) {
    document.getElementById("file-name-display").textContent = file ? file.name : "";
  }

  async function uploadFile() {
    var progressWrap = document.getElementById("progress-wrap");
    var progressBar  = document.getElementById("progress-bar");
    var uploadBtn    = document.getElementById("upload-btn");
    if (!fileInput.files.length) { setStatus("Please select a file first.", "error"); return; }
    var formData = new FormData();
    formData.append("file", fileInput.files[0]);
    uploadBtn.disabled = true;
    setStatus("Processing document...", "loading");
    progressWrap.classList.add("show");
    var pct = 0;
    var pTimer = setInterval(function() { pct = Math.min(pct + 8, 85); progressBar.style.width = pct + "%"; }, 200);
    try {
      var resp = await fetch("/upload", { method: "POST", body: formData });
      var data = await resp.json();
      clearInterval(pTimer);
      progressBar.style.width = "100%";
      if (resp.ok) {
        setStatus("Done: " + data.message, "success");
        var name = fileInput.files[0].name;
        document.getElementById("doc-badge").classList.add("show");
        document.getElementById("doc-badge-name").textContent = name;
      } else {
        setStatus("Error: " + data.error, "error");
      }
    } catch(e) {
      clearInterval(pTimer);
      setStatus("Network error: " + e.message, "error");
    } finally {
      uploadBtn.disabled = false;
      setTimeout(function() { progressWrap.classList.remove("show"); progressBar.style.width = "0"; }, 800);
    }
  }

  function setStatus(msg, type) {
    var el = document.getElementById("upload-status");
    el.textContent = msg;
    el.className = "upload-status " + type;
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 160) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  var isStreaming = false;
  function now() { return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }); }

  function addMessage(role, content) {
    var es = document.getElementById("empty-state");
    if (es) es.remove();
    var box = document.getElementById("chat-box");
    var isUser = role === "user";
    var row = document.createElement("div");
    row.className = "msg-row " + (isUser ? "user" : "bot");
    row.innerHTML =
      '<div class="avatar ' + (isUser ? "user-av" : "bot-av") + '">' + (isUser ? "You" : "AI") + "</div>" +
      '<div class="msg-group">' +
        '<div class="bubble">' + escapeHtml(content) + "</div>" +
        '<div class="msg-meta">' + now() + "</div>" +
      "</div>";
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
    return row.querySelector(".bubble");
  }

  function addThinkingBubble() {
    var es = document.getElementById("empty-state");
    if (es) es.remove();
    var box = document.getElementById("chat-box");
    var row = document.createElement("div");
    row.className = "msg-row bot";
    row.id = "thinking-row";
    row.innerHTML =
      '<div class="avatar bot-av">AI</div>' +
      '<div class="msg-group">' +
        '<div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>' +
        '<div class="msg-meta">' + now() + "</div>" +
      "</div>";
    box.appendChild(row);
    box.scrollTop = box.scrollHeight;
    return row.querySelector(".bubble");
  }

  function escapeHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function renderMarkdown(text) {
    return text
      .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      .replace(/\n/g, "<br>");
  }

  async function sendMessage() {
    if (isStreaming) return;
    var input   = document.getElementById("user-input");
    var model   = document.getElementById("model-select").value;
    var query   = input.value.trim();
    if (!query) return;
    addMessage("user", query);
    input.value = ""; input.style.height = "auto";
    var sendBtn = document.getElementById("send-btn");
    sendBtn.disabled = true; isStreaming = true;
    var bubble = addThinkingBubble();
    var fullText = "", started = false;
    try {
      var resp = await fetch("/chat/stream", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query: query, model: model })
      });
      if (!resp.ok) {
        var err = await resp.json();
        bubble.innerHTML = '<span style="color:var(--danger)">Error: ' + escapeHtml(err.error || "Unknown") + "</span>";
        return;
      }
      var reader = resp.body.getReader();
      var decoder = new TextDecoder();
      var buffer = "";
      while (true) {
        var result = await reader.read();
        if (result.done) break;
        buffer += decoder.decode(result.value, { stream: true });
        var lines = buffer.split("\n");
        buffer = lines.pop();
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          if (line.indexOf("data: ") !== 0) continue;
          var json = line.slice(6).trim();
          if (!json) continue;
          try {
            var chunk = JSON.parse(json);
            if (chunk.error) {
              bubble.innerHTML = '<span style="color:var(--danger)">Error: ' + escapeHtml(chunk.error) + "</span>";
              return;
            }
            if (chunk.token) {
              if (!started) { bubble.innerHTML = ""; started = true; }
              fullText += chunk.token;
              bubble.innerHTML = renderMarkdown(fullText) + '<span class="cursor"></span>';
              document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
            }
            if (chunk.done) { bubble.innerHTML = renderMarkdown(fullText); }
          } catch(ex) {}
        }
      }
      if (!started) bubble.innerHTML = '<span style="color:var(--text-2)">No response received.</span>';
      else bubble.innerHTML = renderMarkdown(fullText);
    } catch(e) {
      bubble.innerHTML = '<span style="color:var(--danger)">Connection error: ' + escapeHtml(e.message) + "</span>";
    } finally {
      isStreaming = false; sendBtn.disabled = false; input.focus();
    }
  }

  async function clearChat() {
    await fetch("/chat/clear", { method: "POST" });
    var box = document.getElementById("chat-box");
    box.innerHTML = '<div class="empty-state" id="empty-state"><div class="big-icon">[chat]</div><h3>Start a conversation</h3><p>Upload a PDF, Word, or Excel file on the left, then ask anything about it.</p></div>';
  }
</script>
</body>
</html>
